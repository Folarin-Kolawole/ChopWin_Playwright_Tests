name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'   # 6:00 AM Nigeria time
    - cron: '0 20 * * *'  # 9:00 PM Nigeria time

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        id: playwright
        continue-on-error: true
        run: npx playwright test

      - name: Read Playwright JSON report
        if: always()
        id: summary
        shell: bash
        run: |
          node -e "
          const fs = require('fs');

          let passed = 0;
          let failed = 0;
          let skipped = 0;
          let timedOut = 0;
          let interrupted = 0;
          let durationMs = 0;

          function walkSuite(suite) {
            if (suite.specs) {
              for (const spec of suite.specs) {
                for (const test of spec.tests || []) {
                  for (const result of test.results || []) {
                    durationMs += result.duration || 0;
                  }

                  const statuses = (test.results || []).map(r => r.status);
                  if (statuses.includes('failed')) failed++;
                  else if (statuses.includes('timedOut')) timedOut++;
                  else if (statuses.includes('interrupted')) interrupted++;
                  else if (statuses.includes('skipped')) skipped++;
                  else if (statuses.includes('passed')) passed++;
                }
              }
            }

            for (const child of suite.suites || []) {
              walkSuite(child);
            }
          }

          try {
            const report = JSON.parse(fs.readFileSync('test-results/results.json', 'utf8'));
            for (const suite of report.suites || []) walkSuite(suite);
          } catch (error) {
            console.log('Could not read Playwright JSON report');
          }

          const totalFailed = failed + timedOut + interrupted;
          const status = totalFailed > 0 ? 'failed' : 'passed';
          const durationSec = Math.round(durationMs / 1000);

          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'status=' + status + '\n');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'passed=' + passed + '\n');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'failed=' + failed + '\n');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'skipped=' + skipped + '\n');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'timed_out=' + timedOut + '\n');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'interrupted=' + interrupted + '\n');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'duration_sec=' + durationSec + '\n');
          "

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14

      - name: Notify Slack
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.summary.outputs.status }}" = "passed" ]; then
            ICON="✅"
            STATE="PASSED"
          else
            ICON="❌"
            STATE="FAILED"
          fi

          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          PAYLOAD=$(cat <<EOF
          {
            "text": "${ICON} Playwright Tests ${STATE}",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*${ICON} Playwright Tests ${STATE}*"
                }
              },
              {
                "type": "section",
                "fields": [
                  { "type": "mrkdwn", "text": "*Repo:*\n${{ github.repository }}" },
                  { "type": "mrkdwn", "text": "*Branch:*\n${{ github.ref_name }}" },
                  { "type": "mrkdwn", "text": "*Passed:*\n${{ steps.summary.outputs.passed }}" },
                  { "type": "mrkdwn", "text": "*Failed:*\n${{ steps.summary.outputs.failed }}" },
                  { "type": "mrkdwn", "text": "*Skipped:*\n${{ steps.summary.outputs.skipped }}" },
                  { "type": "mrkdwn", "text": "*Timed out:*\n${{ steps.summary.outputs.timed_out }}" },
                  { "type": "mrkdwn", "text": "*Interrupted:*\n${{ steps.summary.outputs.interrupted }}" },
                  { "type": "mrkdwn", "text": "*Duration:*\n${{ steps.summary.outputs.duration_sec }}s" }
                ]
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Run:* ${RUN_URL}"
                }
              }
            ]
          }
          EOF
          )

          curl -X POST -H 'Content-type: application/json' \
            --data "$PAYLOAD" \
            "${{ secrets.SLACK_WEBHOOK_URL }}"

      - name: Fail workflow if tests failed
        if: steps.playwright.outcome == 'failure'
        run: exit 1